{% extends "base.html" %}

{% block title %}Forgot Password — Nova{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <div class="card-body">
            <div class="auth-icon">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h3 class="card-title text-center">Verify Identity</h3>
            <p class="card-subtitle text-center mb-4">Enter your name and email to reset your password</p>

            <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="name" placeholder="Enter your registered name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">
                    <i class="fas fa-search me-2"></i>Verify Account
                </button>
            </form>

            <hr>
            <div class="text-center">
                <a href="{{ url_for('auth.login') }}" class="auth-link">
                    <i class="fas fa-arrow-left me-1"></i>Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
