{% extends "base.html" %}

{% block title %}Reset Password — Nova{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <div class="card-body">
            <div class="auth-icon">
                <i class="fas fa-lock-open"></i>
            </div>
            <h3 class="card-title text-center">Reset Password</h3>
            <p class="card-subtitle text-center mb-4">Choose a new strong password for your account</p>

            <form method="POST" action="{{ url_for('auth.reset_password', user_id=user_id) }}">
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" name="password" id="password" placeholder="Enter new password" required>
                        <span class="input-group-text">
                            <i class="fa-solid fa-eye" id="togglePassword"></i>
                        </span>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm New Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" name="confirm_password" id="confirm_password" placeholder="Repeat new password" required>
                        <span class="input-group-text">
                            <i class="fa-solid fa-eye" id="toggleConfirmPassword"></i>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">
                    <i class="fas fa-check-circle me-2"></i>Reset Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
