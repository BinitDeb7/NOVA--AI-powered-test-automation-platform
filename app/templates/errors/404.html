{% extends "base.html" %}
{% block title %}404 — Page Not Found — Nova{% endblock %}
{% block content %}
<div class="text-white text-center" style="padding: 6rem 0;">
    <div style="font-size:6rem;font-weight:900;background:linear-gradient(135deg,var(--color-primary-light),var(--color-accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;">404</div>
    <h2 style="font-weight:700;color:var(--text-heading);margin:1rem 0 0.5rem;">Page Not Found</h2>
    <p style="color:var(--text-secondary);max-width:400px;margin:0 auto 2rem;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('main.dashboard') if current_user.is_authenticated else url_for('main.index') }}" class="btn btn-primary">
        <i class="fas fa-home me-2"></i>Back to Home
    </a>
</div>
{% endblock %}
